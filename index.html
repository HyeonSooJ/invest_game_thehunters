<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모의투자 대회 최종 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>.screen { display: none; } .active-screen { display: flex; }</style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="screen-main" class="screen active-screen min-h-screen items-center justify-center p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl">
            <h1 class="text-2xl font-bold mb-6 text-center">모의투자 대회</h1>
            <div class="flex flex-col gap-2 mb-4">
                <input type="text" id="nickname" placeholder="닉네임 입력" class="px-4 py-3 border rounded-xl">
                <button onclick="handleNickname()" id="nick-btn" class="bg-slate-800 text-white py-3 rounded-xl font-bold">확인</button>
                <div id="status-msg" class="text-sm font-bold text-blue-600 text-center h-5"></div>
                <input type="text" id="search-group" oninput="renderGroups()" placeholder="그룹 검색..." class="px-4 py-2 border rounded-xl text-sm">
                <div id="state-display" class="text-xs text-gray-500 text-center font-bold">닉네임 - 그룹 미선택</div>
            </div>
            <div id="group-list" class="h-40 overflow-y-auto border rounded-xl p-2 space-y-2 text-sm mb-4"></div>
            <button onclick="handleMainButton()" id="main-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hidden">참가 확정</button>
            <div class="grid grid-cols-3 gap-2 mt-2">
                <button onclick="adminAction('create')" class="text-xs bg-slate-100 py-2 rounded-lg text-slate-600">그룹 생성</button>
                <button onclick="adminAction('deleteParticipant')" class="text-xs bg-orange-100 py-2 rounded-lg text-orange-600">참가자 삭제</button>
                <button onclick="adminAction('reset')" class="text-xs bg-red-100 py-2 rounded-lg text-red-600">데이터 초기화</button>
            </div>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-slate-50 z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl"></div>
    </div>

    <div id="screen-game" class="screen min-h-screen items-center justify-center p-4">
        <div id="game-ui" class="max-w-2xl w-full bg-white p-10 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="round-title" class="text-2xl font-black"></h2>
                <span class="bg-slate-800 text-white text-[10px] px-3 py-1 rounded-full">기간: 2024.06~2026.06</span>
            </div>
            <p id="price-display" class="text-lg font-bold text-slate-700 mb-4"></p>
            <div id="trade-alert" class="hidden text-red-500 font-bold text-center mb-4 animate-pulse">⚠️ 대회 중 매수/매도 1번은 해야 합니다!</div>
            <div class="w-full h-64 mb-6"><canvas id="stockChart"></canvas></div>
            <div class="bg-slate-100 p-6 rounded-2xl mb-6 flex justify-between items-center">
                <div><p class="text-sm text-slate-500">예수금</p><p id="cash-display" class="text-2xl font-black text-blue-600">500,000</p></div>
                <div><p class="text-sm text-slate-500">보유 주식</p><p id="stock-display" class="text-2xl font-black text-emerald-600">0</p></div>
            </div>
            <div id="trade-input-area" class="mb-6 flex gap-2">
                <input type="number" id="qty-input" min="0" class="flex-grow p-4 border rounded-xl text-center text-lg font-bold" placeholder="수량 입력 후 사기/팔기 버튼 클릭">
                <button onclick="setMaxQty()" class="bg-slate-200 text-slate-700 px-4 rounded-xl font-bold text-sm">가능</button>
                <button onclick="trade('buy')" class="bg-red-500 text-white px-8 rounded-xl font-bold text-lg">사기</button>
                <button onclick="trade('sell')" class="bg-blue-500 text-white px-8 rounded-xl font-bold text-lg">팔기</button>
            </div>
            <button id="next-btn" onclick="nextQuarter()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">다음</button>
        </div>
        <div id="result-ui" class="hidden max-w-lg w-full bg-white p-8 rounded-3xl shadow-2xl text-center">
            <h2 id="result-title" class="text-2xl font-bold mb-4">결과</h2>
            <div id="stats-box" class="mb-6 text-left text-sm space-y-2"></div>
            <button id="result-btn" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold"></button>
        </div>
    </div>

    <script>
        /* ====================================================================
         * 참가자 데이터(그룹/닉네임/수익률)는 이 페이지가 직접 GitHub에 쓰지 않고,
         * Cloudflare Worker(WORKER_URL)를 통해서만 저장/조회합니다.
         * 진짜 GitHub 토큰은 Worker 안의 비밀 환경변수에만 있고, 이 HTML에는
         * 전혀 존재하지 않습니다 — 그래서 참가자들에게 토큰을 나눠줄 필요가 없고,
         * "소스 보기"를 해도 아무 비밀 값도 보이지 않습니다.
         * Worker 배포 방법은 cloudflare-worker/worker.js 파일 상단 주석을 참고하세요.
         * ==================================================================== */
        const WORKER_URL = 'https://investgame-thehunters.thehunters.workers.dev';

        async function callWorker(path, body) {
            const res = await fetch(`${WORKER_URL}${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body || {})
            });
            const result = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(result.error || `요청 실패 (${res.status})`);
            return result;
        }
        function fetchState() { return callWorker('/state', {}); }

        Chart.register(ChartDataLabels);

        let state = { nick: "", group: "", isConfirmed: false, myDocId: null, currentRound: 0, currentQ: 0, cash: 500000, stockQty: 0, r1FinalCash: 500000, hasTraded: false };
        const rounds = [{ name: "1라운드", stock: "마녀공장", prices: [27050, 21250, 16370, 16200, 18130] }, { name: "2라운드", stock: "카카오", prices: [43300, 37350, 40550, 43000, 43700] }];
        const labels = ['2024년 06월', '2024년 09월', '2024년 12월', '2025년 03월', '종가'];
        const hints = [`<h2 class="text-xl font-bold mb-4">1라운드(마녀공장)</h2><div class="text-sm space-y-3 text-left"><p>🟢 <b>미국·일본 수출 확대</b><br>K-뷰티 수출이 미국과 일본을 중심으로 성장하면서 해외 매출 확대 기대가 높아지고 있습니다.</p><p>🟢 <b>해외 채널 확장</b><br>아마존과 일본 드럭스토어 등 해외 판매 채널 확대를 추진하고 있습니다.</p><p>🔴 <b>높은 성장 기대감</b><br>상장 이후 성장 기대가 높아진 상태로 향후 실적이 기대에 못 미칠 경우 주가 변동성이 확대될 수 있습니다.</p><p>🔴 <b>치열한 경쟁</b><br>K-뷰티 시장에는 다수의 중소·중견 브랜드가 경쟁하고 있어 지속적인 브랜드 경쟁력 확보가 필요합니다.</p></div>`, `<h2 class="text-xl font-bold mb-4">2라운드(카카오)</h2><div class="text-sm space-y-3 text-left"><p>🟢 <b>1분기 영업이익 92% 증가</b><br>2024년 1분기 영업이익이 1,203억 원으로 전년 동기 대비 92% 증가했으며 톡비즈 매출도 8% 성장했습니다.</p><p>🟢 <b>AI 조직 재편</b><br>카카오는 2024년 5월 카카오브레인의 초거대 AI 모델 사업을 흡수하며 AI 서비스 개발 역량을 집중하고 있습니다.</p><p>🔴 <b>플랫폼 규제</b><br>카카오모빌리티와 플랫폼 사업에 대한 규제 논의 및 공정위 조사가 2024년에도 계속되고 있습니다.</p><p>🔴 <b>실적 기대치 부담</b><br>영업이익은 전년 대비 크게 증가했지만 일부 증권사 예상치에는 미치지 못했다는 평가도 나왔습니다.</p></div><p class="text-xs text-gray-400 mt-4">* 2024년 1월~2024년 6월까지 정보입니다. 참고만 하시길 바랍니다.</p>`];

        function handleNickname() { const n = document.getElementById('nickname').value; if(!n) return alert("닉네임 필수!"); state.nick = n; alert("한 번 입력하면 수정이 불가능합니다 ! 수정을 원하시면 새로고침을 눌러주세요 !"); document.getElementById('status-msg').innerText = `${n} 님 화이팅!!`; document.getElementById('nickname').disabled = true; document.getElementById('nick-btn').style.display = 'none'; }
        function openModal(html, callback) { document.getElementById('modal-container').classList.remove('hidden'); document.getElementById('modal-content').innerHTML = html + `<button onclick="closeModal()" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-xl font-bold">확인</button>`; window.nextAction = callback; }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); if(window.nextAction) window.nextAction(); }
        function showHint(idx) { if(idx === 1) { state.stockQty = 0; } openModal(hints[idx], () => { document.getElementById('screen-main').style.display = 'none'; document.getElementById('screen-game').style.display = 'flex'; state.currentRound = idx; state.currentQ = 0; initChart(); updateGameUI(); }); }

        async function renderGroups() {
            const k = document.getElementById('search-group').value.toLowerCase();
            let data;
            try { data = await fetchState(); } catch (e) { console.error(e); return; }
            const groups = [...data.groups].sort((a, b) => a.name.localeCompare(b.name));
            const cnt = {};
            data.participants.forEach(p => { cnt[p.group] = (cnt[p.group] || 0) + 1; });
            const list = document.getElementById('group-list'); list.innerHTML = '';
            groups.forEach(g => {
                if (!g.name.toLowerCase().includes(k)) return;
                const div = document.createElement('div'); div.className = `p-3 border rounded cursor-pointer flex justify-between ${state.group === g.name ? 'bg-blue-50 border-blue-500' : ''}`;
                div.innerHTML = `<span ondblclick="updateGroupName('${g.id}', '${g.name}')">${g.name}</span> <span class="font-bold text-blue-600">${cnt[g.name] || 0}명</span>`;
                div.onclick = () => selectGroup(g.name); list.appendChild(div);
            });
        }
        async function selectGroup(n) {
            if (state.group === n) return;
            if (state.group && !confirm("그룹 변경 시 기존 정보 삭제됩니다.")) return;
            if (state.myDocId) {
                await callWorker('/remove-participant', { id: state.myDocId });
                state.myDocId = null;
            }
            state.group = n; state.isConfirmed = false;
            document.getElementById('main-btn').classList.remove('hidden', 'bg-emerald-600');
            document.getElementById('main-btn').innerText = "참가 확정";
            document.getElementById('state-display').innerText = `${state.nick || "닉네임"} - ${n}`;
            renderGroups();
        }
        async function handleMainButton() {
            if(!state.isConfirmed) {
                if(!state.nick) return alert("닉네임 필수!");
                try {
                    const r = await callWorker('/add-participant', { nickname: state.nick, group: state.group });
                    state.myDocId = r.id; state.isConfirmed = true;
                    document.getElementById('main-btn').innerText = "대회 시작하기";
                    document.getElementById('main-btn').classList.add('bg-emerald-600');
                } catch (e) {
                    if (e.message === 'duplicate') return alert("이미 존재하는 닉네임입니다.");
                    return alert("참가 등록 실패: " + e.message);
                }
            } else {
                openModal(`<h2 class="text-xl font-bold mb-4">모의투자대회 설명</h2><div class="text-sm text-left space-y-2"><p>1. 대회는 총 2라운드로 구성되고 각 라운드별 4번의 매수/매도 기회가 있습니다.</p><p>2. 투자기간 : 2024.06~2025.06</p><p>3. 대회 중 매수/매도 1번은 진행해야 합니다.</p><p>4. 재미로 즐겨주시면 감사하겠습니다 !! 화이팅 !!</p></div>`, () => showHint(0));
            }
        }
        async function adminAction(t) {
            const pw = prompt("관리자 비밀번호:");
            if (pw === null) return;
            try {
                if (t === 'reset') {
                    await callWorker('/reset', { adminPassword: pw });
                    location.reload();
                } else if (t === 'create') {
                    const n = prompt("그룹명:");
                    if (!n) return;
                    await callWorker('/create-group', { name: n, adminPassword: pw });
                    renderGroups();
                }
            } catch (e) {
                alert(e.message === 'unauthorized' ? '비밀번호가 틀렸습니다.' : e.message);
            }
        }
        async function updateGroupName(id, old) {
            const pw = prompt("관리자 비밀번호:");
            if (pw === null) return;
            if (confirm(`"${old}" 그룹을 삭제하시겠습니까?\n(취소를 누르면 그룹 이름을 수정합니다)`)) {
                try {
                    await callWorker('/delete-group', { id, adminPassword: pw });
                    renderGroups();
                } catch (e) {
                    alert(e.message === 'unauthorized' ? '비밀번호가 틀렸습니다.' : e.message);
                }
                return;
            }
            const n = prompt("새 그룹명:", old);
            if (!n) return;
            try {
                await callWorker('/rename-group', { id, name: n, adminPassword: pw });
                renderGroups();
            } catch (e) {
                alert(e.message === 'unauthorized' ? '비밀번호가 틀렸습니다.' : e.message);
            }
        }

        function initChart() { const ctx = document.getElementById('stockChart').getContext('2d'); if(window.myChart) myChart.destroy(); myChart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: '가격', data: [], borderColor: '#3b82f6', datalabels: { anchor: 'end', align: 'top', formatter: (v) => v.toLocaleString() } }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: true } } } }); }
        function updateGameUI() { const isC = state.currentQ === 4; document.getElementById('round-title').innerText = `${state.currentRound + 1}라운드 - ${rounds[state.currentRound].stock}(${isC ? '종가' : (state.currentQ + 1) + '분기'})`; document.getElementById('price-display').innerText = `현재가 : ${rounds[state.currentRound].prices[state.currentQ].toLocaleString()}원`; document.getElementById('cash-display').innerText = state.cash.toLocaleString(); document.getElementById('stock-display').innerText = state.stockQty; document.getElementById('trade-input-area').style.display = isC ? 'none' : 'flex'; myChart.data.labels = labels.slice(0, state.currentQ + 1); myChart.data.datasets[0].data = rounds[state.currentRound].prices.slice(0, state.currentQ + 1); myChart.update(); }
        function setMaxQty() { const p = rounds[state.currentRound].prices[state.currentQ]; document.getElementById('qty-input').value = Math.floor(state.cash / p); }
        function trade(t) { const q = parseInt(document.getElementById('qty-input').value); if(isNaN(q) || q <= 0) return alert("1 이상의 수량을 입력하세요"); if(!confirm(`${q}주를 ${t === 'buy' ? '사시겠습니까?' : '파시겠습니까?'}`)) return; if(q > 0) state.hasTraded = true; const p = rounds[state.currentRound].prices[state.currentQ]; if(t === 'buy') { if(state.cash < q * p) return alert("예수금 부족"); state.cash -= q * p; state.stockQty += q; } else { if(state.stockQty < q) return alert("보유 주식 부족"); state.cash += q * p; state.stockQty -= q; } updateGameUI(); }
        function nextQuarter() {
            if (state.currentRound === 1 && state.currentQ === 3 && !state.hasTraded) return alert("대회 중 매수/매도 1번은 해야 합니다!");
            if(state.currentQ < 3) { state.currentQ++; updateGameUI(); }
            else if(state.currentQ === 3) { if (state.stockQty > 0) { state.cash += state.stockQty * rounds[state.currentRound].prices[4]; state.stockQty = 0; } state.currentQ = 4; updateGameUI(); }
            else { showResult(state.currentRound === 1, state.cash); }

            const qtyInput = document.getElementById('qty-input');
            qtyInput.value = '';
            qtyInput.placeholder = '수량 입력 후 사기/팔기 버튼 클릭';
        }
        function showResult(isF, f) { document.getElementById('game-ui').classList.add('hidden'); document.getElementById('result-ui').classList.remove('hidden'); let initialCash = !isF ? 500000 : state.r1FinalCash; let profit = (f / initialCash * 100 - 100); if (!isF) { state.r1FinalCash = f; document.getElementById('result-title').innerText = "1라운드 결과"; document.getElementById('stats-box').innerHTML = `<p>초기 예수금 : ${initialCash.toLocaleString()}</p><p>현재 예수금 : ${f.toLocaleString()}</p><p>수익률 : ${profit.toFixed(2)}%</p>`; document.getElementById('result-btn').innerText = "2라운드 힌트 보기"; document.getElementById('result-btn').onclick = () => { document.getElementById('game-ui').classList.remove('hidden'); document.getElementById('result-ui').classList.add('hidden'); state.cash = state.r1FinalCash; showHint(1); }; } else { document.getElementById('result-title').innerText = "2라운드 결과"; document.getElementById('stats-box').innerHTML = `<p>초기 예수금 : ${initialCash.toLocaleString()}</p><p>현재 예수금 : ${f.toLocaleString()}</p><p>수익률 : ${profit.toFixed(2)}%</p>`; document.getElementById('result-btn').innerText = "최종 결과 확인"; document.getElementById('result-btn').onclick = () => showFinalResult(f); } }
        async function showFinalResult(f) {
            let finalProfit = (f / 500000 * 100 - 100);
            document.getElementById('result-title').innerText = "최종 결과";
            document.getElementById('stats-box').innerHTML = `<p>초기 예수금 : 500,000</p><p>최종 금액 : ${f.toLocaleString()}</p><p>최종 수익률 : ${finalProfit.toFixed(2)}%</p>`;
            const myId = state.myDocId; const profitVal = parseFloat(finalProfit.toFixed(2));
            await callWorker('/update-profit', { id: myId, profit: profitVal });
            document.getElementById('result-btn').innerText = "순위 보기";
            document.getElementById('result-btn').onclick = showRankings;
        }
        async function showRankings() {
            const data = await fetchState();
            let list = data.participants.filter(p => p.group === state.group).map(p => ({ name: p.nickname, profit: p.profit || 0 }));
            list.sort((a, b) => b.profit - a.profit);
            const me = list.find(x => x.name === state.nick);
            let h = `<div class="mb-4 p-3 bg-purple-100 border-2 border-purple-500 rounded-xl font-bold">나의 닉네임 : ${state.nick}<br>나의 수익률 : ${(me ? me.profit : 0).toFixed(2)}%</div><div class="max-h-60 overflow-y-auto"><table class="w-full text-center text-sm"><thead><tr><th>순위</th><th>닉네임</th><th>수익률</th></tr></thead><tbody>`;
            list.forEach((item, i) => { const isMe = item.name === state.nick; h += `<tr class="${isMe ? 'bg-purple-200 border-2 border-purple-500 font-bold' : ''}"><td>${i+1}위</td><td>${item.name}</td><td>${item.profit.toFixed(2)}%</td></tr>`; });
            h += `</tbody></table></div>`;
            document.getElementById('stats-box').innerHTML = h;
            document.getElementById('result-btn').innerText = "종료 (새로고침)";
            document.getElementById('result-btn').onclick = () => location.reload();
        }

        renderGroups();
        setInterval(renderGroups, 8000); // 실시간 구독 대신 폴링으로 갱신합니다.
    </script>
</body>
</html>
