    <script>
        /* ====================================================================
         * GitHub м ҖмһҘмҶҢлҘј м°ёк°Җмһҗ DBлЎң мӮ¬мҡ©н•©лӢҲлӢӨ (Firebase лҜёмӮ¬мҡ©).
         * мқҙ лҰ¬нҸ¬м§ҖнҶ лҰ¬(GITHUB_CONFIG.owner/repo)мқҳ data/ нҸҙлҚ”м—җ мһҲлҠ” JSON нҢҢмқјмқ„
         * GitHub Contents APIлЎң мқҪкі  м”ҒлӢҲлӢӨ.
         *
         * вҡ пёҸ ліҙм•Ҳ мЈјмқҳ вҡ пёҸ
         * мқҙ нҺҳмқҙм§ҖлҠ” мҲңмҲҳ м •м Ғ HTMLмқҙлқј лі„лҸ„ м„ңлІ„к°Җ м—ҶмңјлҜҖлЎң, GitHubм—җ м“°кё° мң„н•ң
         * Personal Access Tokenмқ„ м•„лһҳ TOKEN к°’м—җ м§Ғм ‘ л„Јм–ҙм•ј н•©лӢҲлӢӨ. мқҙ нҶ нҒ°мқҖ
         * лҲ„кө¬л“  мқҙ нҺҳмқҙм§Җмқҳ "мҶҢмҠӨ ліҙкё°"л§Ң н•ҳл©ҙ к·ёлҢҖлЎң ліј мҲҳ мһҲмҠөлӢҲлӢӨ.
         * л°ҳл“ңмӢң м•„лһҳ мЎ°кұҙмқ„ м§Җмјңм„ң нҶ нҒ°мқ„ л§Ңл“ңм„ёмҡ”:
         *   1) Fine-grained personal access token мӮ¬мҡ© (classic token кёҲм§Җ)
         *   2) Repository accessлҘј мқҙ м ҖмһҘмҶҢ(marcap) н•ҳлӮҳлЎңл§Ң м ңн•ң
         *   3) PermissionsлҠ” "Contents: Read and write" н•ҳлӮҳл§Ң л¶Җм—¬
         *   4) л§ҢлЈҢ кё°к°„мқ„ м§§кІҢ(мҳҲ: 30~90мқј) м„Өм •н•ҳкі , лҢҖнҡҢк°Җ лҒқлӮҳл©ҙ мҰүмӢң нҸҗкё°(revoke)
         * мқҙ нҺҳмқҙм§ҖлҘј л¶ҲнҠ№м • лӢӨмҲҳм—җкІҢ кіөмң н•ҳлҠ” мҲңк°„, к·ё мӮ¬лһҢл“ӨлҸ„ мқҙ нҶ нҒ°мңјлЎң
         * invest_game_thehunters м ҖмһҘмҶҢмқҳ data нҢҢмқјмқ„ л§ҲмқҢлҢҖлЎң лҚ®м–ҙм“ё мҲҳ мһҲлӢӨлҠ” м җмқ„ к°җм•Ҳн•ҳм„ёмҡ”.
         * ==================================================================== */
        const GITHUB_CONFIG = {
            owner: 'hyeonsooj',
            repo: 'invest_game_thehunters',
            branch: 'main',
            path: 'data/mock-investment-data.json',
            leaderboardPath: 'LEADERBOARD.md', // к·ёлЈ№/м°ёк°Җмһҗ/мҲҳмқөлҘ мқ„ н‘ңлЎң ліҙм—¬мЈјлҠ” мһҗлҸҷ мғқм„ұ нҢҢмқј
            token: 'YOUR_GITHUB_FINE_GRAINED_TOKEN' // TODO: л°ңкёүл°ӣмқҖ нҶ нҒ°мңјлЎң көҗмІҙн•ҳм„ёмҡ”
        };

        Chart.register(ChartDataLabels);

        let state = { nick: "", group: "", isConfirmed: false, myDocId: null, currentRound: 0, currentQ: 0, cash: 500000, stockQty: 0, r1FinalCash: 500000, hasTraded: false };
        const rounds = [{ name: "1лқјмҡҙл“ң", stock: "л§Ҳл…ҖкіөмһҘ", prices: [27050, 21250, 16370, 16200, 18130] }, { name: "2лқјмҡҙл“ң", stock: "м№ҙм№ҙмҳӨ", prices: [43300, 37350, 40550, 43000, 43700] }];
        const labels = ['2024л…„ 06мӣ”', '2024л…„ 09мӣ”', '2024л…„ 12мӣ”', '2025л…„ 03мӣ”', 'мў…к°Җ'];
        const hints = [`<h2 class="text-xl font-bold mb-4">1лқјмҡҙл“ң(л§Ҳл…ҖкіөмһҘ)</h2><div class="text-sm space-y-3 text-left"><p>рҹҹў <b>лҜёкөӯВ·мқјліё мҲҳм¶ң нҷ•лҢҖ</b><br>K-л·°нӢ° мҲҳм¶ңмқҙ лҜёкөӯкіј мқјліёмқ„ мӨ‘мӢ¬мңјлЎң м„ұмһҘн•ҳл©ҙм„ң н•ҙмҷё л§Өм¶ң нҷ•лҢҖ кё°лҢҖк°Җ лҶ’м•„м§Җкі  мһҲмҠөлӢҲлӢӨ.</p><p>рҹҹў <b>н•ҙмҷё мұ„л„җ нҷ•мһҘ</b><br>м•„л§ҲмЎҙкіј мқјліё л“ңлҹӯмҠӨнҶ м–ҙ л“ұ н•ҙмҷё нҢҗл§Ө мұ„л„җ нҷ•лҢҖлҘј м¶”м§„н•ҳкі  мһҲмҠөлӢҲлӢӨ.</p><p>рҹ”ҙ <b>лҶ’мқҖ м„ұмһҘ кё°лҢҖк°җ</b><br>мғҒмһҘ мқҙнӣ„ м„ұмһҘ кё°лҢҖк°Җ лҶ’м•„м§„ мғҒнғңлЎң н–Ҙнӣ„ мӢӨм Ғмқҙ кё°лҢҖм—җ лӘ» лҜём№  кІҪмҡ° мЈјк°Җ ліҖлҸҷм„ұмқҙ нҷ•лҢҖлҗ  мҲҳ мһҲмҠөлӢҲлӢӨ.</p><p>рҹ”ҙ <b>м№ҳм—ҙн•ң кІҪмҹҒ</b><br>K-л·°нӢ° мӢңмһҘм—җлҠ” лӢӨмҲҳмқҳ мӨ‘мҶҢВ·мӨ‘кІ¬ лёҢлһңл“ңк°Җ кІҪмҹҒн•ҳкі  мһҲм–ҙ м§ҖмҶҚм Ғмқё лёҢлһңл“ң кІҪмҹҒл Ҙ нҷ•ліҙк°Җ н•„мҡ”н•©лӢҲлӢӨ.</p></div>`, `<h2 class="text-xl font-bold mb-4">2лқјмҡҙл“ң(м№ҙм№ҙмҳӨ)</h2><div class="text-sm space-y-3 text-left"><p>рҹҹў <b>1л¶„кё° мҳҒм—…мқҙмқө 92% мҰқк°Җ</b><br>2024л…„ 1л¶„кё° мҳҒм—…мқҙмқөмқҙ 1,203м–ө мӣҗмңјлЎң м „л…„ лҸҷкё° лҢҖл№„ 92% мҰқк°Җн–Ҳмңјл©° нҶЎл№„мҰҲ л§Өм¶ңлҸ„ 8% м„ұмһҘн–ҲмҠөлӢҲлӢӨ.</p><p>рҹҹў <b>AI мЎ°м§Ғ мһ¬нҺё</b><br>м№ҙм№ҙмҳӨлҠ” 2024л…„ 5мӣ” м№ҙм№ҙмҳӨлёҢл Ҳмқёмқҳ мҙҲкұ°лҢҖ AI лӘЁлҚё мӮ¬м—…мқ„ нқЎмҲҳн•ҳл©° AI м„ңл№„мҠӨ к°ңл°ң м—ӯлҹүмқ„ м§‘мӨ‘н•ҳкі  мһҲмҠөлӢҲлӢӨ.</p><p>рҹ”ҙ <b>н”Ңлһ«нҸј к·ңм ң</b><br>м№ҙм№ҙмҳӨлӘЁл№ҢлҰ¬нӢ°мҷҖ н”Ңлһ«нҸј мӮ¬м—…м—җ лҢҖн•ң к·ңм ң л…јмқҳ л°Ҹ кіөм •мң„ мЎ°мӮ¬к°Җ 2024л…„м—җлҸ„ кі„мҶҚлҗҳкі  мһҲмҠөлӢҲлӢӨ.</p><p>рҹ”ҙ <b>мӢӨм Ғ кё°лҢҖм№ҳ л¶ҖлӢҙ</b><br>мҳҒм—…мқҙмқөмқҖ м „л…„ лҢҖл№„ нҒ¬кІҢ мҰқк°Җн–Ҳм§Җл§Ң мқјл¶Җ мҰқк¶ҢмӮ¬ мҳҲмғҒм№ҳм—җлҠ” лҜём№ҳм§Җ лӘ»н–ҲлӢӨлҠ” нҸүк°ҖлҸ„ лӮҳмҷ”мҠөлӢҲлӢӨ.</p></div><p class="text-xs text-gray-400 mt-4">* 2024л…„ 1мӣ”~2024л…„ 6мӣ”к№Ңм§Җ м •ліҙмһ…лӢҲлӢӨ. м°ёкі л§Ң н•ҳмӢңкёё л°”лһҚлӢҲлӢӨ.</p>`];

        // ---------------- GitHub Contents API н—¬нҚј ----------------
        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
        }
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }
        function ghUrl(path) {
            return `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`;
        }
        function ghHeaders(extra) {
            return Object.assign({ 'Authorization': `Bearer ${GITHUB_CONFIG.token}`, 'Accept': 'application/vnd.github+json' }, extra || {});
        }
        async function ghReadFile(path) {
            const res = await fetch(`${ghUrl(path)}?ref=${GITHUB_CONFIG.branch}&_=${Date.now()}`, { headers: ghHeaders() });
            if (res.status === 404) return { sha: null, text: null };
            if (!res.ok) throw new Error(`GitHub мқҪкё° мӢӨнҢЁ (${res.status})`);
            const json = await res.json();
            return { sha: json.sha, text: b64DecodeUnicode(json.content.replace(/\n/g, '')) };
        }
        async function ghWriteFile(path, text, sha, message) {
            const body = { message, content: b64EncodeUnicode(text), branch: GITHUB_CONFIG.branch };
            if (sha) body.sha = sha;
            const res = await fetch(ghUrl(path), { method: 'PUT', headers: ghHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify(body) });
            if (res.status === 409) { const e = new Error('CONFLICT'); e.conflict = true; throw e; }
            if (!res.ok) throw new Error(`GitHub м ҖмһҘ мӢӨнҢЁ (${res.status})`);
            return res.json();
        }
        async function ghReadData() {
            const { sha, text } = await ghReadFile(GITHUB_CONFIG.path);
            const data = JSON.parse(text || '{}');
            if (!data.groups) data.groups = [];
            if (!data.participants) data.participants = [];
            return { sha, data };
        }
        // лҸҷмӢң нҺём§‘ м¶©лҸҢ(409) мӢң мөңмӢ ліёмқ„ лӢӨмӢң мқҪм–ҙ мһ¬мӢңлҸ„н•©лӢҲлӢӨ.
        async function ghMutate(mutator, message) {
            for (let i = 0; i < 5; i++) {
                const { sha, data } = await ghReadData();
                mutator(data);
                try {
                    await ghWriteFile(GITHUB_CONFIG.path, JSON.stringify(data, null, 2), sha, message);
                    await syncLeaderboardMarkdown(data);
                    return data;
                } catch (e) {
                    if (e.conflict) { await new Promise(r => setTimeout(r, 300 + Math.random() * 400)); continue; }
                    throw e;
                }
            }
            throw new Error('м ҖмһҘ м¶©лҸҢмқҙ л°ҳліөлҗҳм–ҙ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
        }
        function uid() {
            return (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`);
        }

        // groups/participants лҚ°мқҙн„°лҘј GitHub м ҖмһҘмҶҢ л©”мқём—җм„ң л°”лЎң мқҪмқ„ мҲҳ мһҲлҠ” н‘ң(Markdown)лЎң л§Ңл“Өм–ҙ м»Өл°Ӣн•©лӢҲлӢӨ.
        function buildLeaderboardMarkdown(data) {
            const byGroup = {};
            data.groups.forEach(g => { byGroup[g.name] = []; });
            data.participants.forEach(p => { (byGroup[p.group] || (byGroup[p.group] = [])).push(p); });
            const groupNames = Object.keys(byGroup).sort((a, b) => a.localeCompare(b));
            const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            let md = `# лӘЁмқҳнҲ¬мһҗ лҢҖнҡҢ лҰ¬лҚ”ліҙл“ң\n\n_л§Ҳм§Җл§ү м—…лҚ°мқҙнҠё: ${now} (KST)_\n\n`;
            if (groupNames.length === 0) { md += 'м•„м§Ғ мғқм„ұлҗң к·ёлЈ№мқҙ м—ҶмҠөлӢҲлӢӨ.\n'; return md; }
            groupNames.forEach(name => {
                const list = [...byGroup[name]].sort((a, b) => (b.profit || 0) - (a.profit || 0));
                md += `## ${name} (${list.length}лӘ…)\n\n`;
                if (list.length === 0) { md += 'м°ёк°Җмһҗк°Җ м—ҶмҠөлӢҲлӢӨ.\n\n'; return; }
                md += '| мҲңмң„ | лӢүл„Өмһ„ | мҲҳмқөлҘ  |\n|---|---|---|\n';
                list.forEach((p, i) => { md += `| ${i + 1} | ${p.nickname} | ${(p.profit || 0).toFixed(2)}% |\n`; });
                md += '\n';
            });
            return md;
        }
        async function syncLeaderboardMarkdown(data) {
            for (let i = 0; i < 5; i++) {
                try {
                    const { sha } = await ghReadFile(GITHUB_CONFIG.leaderboardPath);
                    await ghWriteFile(GITHUB_CONFIG.leaderboardPath, buildLeaderboardMarkdown(data), sha, 'update leaderboard');
                    return;
                } catch (e) {
                    if (e.conflict) { await new Promise(r => setTimeout(r, 300 + Math.random() * 400)); continue; }
                    console.error('лҰ¬лҚ”ліҙл“ң к°ұмӢ  мӢӨнҢЁ', e);
                    return;
                }
            }
        }

        function handleNickname() { const n = document.getElementById('nickname').value; if(!n) return alert("лӢүл„Өмһ„ н•„мҲҳ!"); state.nick = n; alert("н•ң лІҲ мһ…л Ҙн•ҳл©ҙ мҲҳм •мқҙ л¶Ҳк°ҖлҠҘн•©лӢҲлӢӨ ! мҲҳм •мқ„ мӣҗн•ҳмӢңл©ҙ мғҲлЎңкі м№Ёмқ„ лҲҢлҹ¬мЈјм„ёмҡ” !"); document.getElementById('status-msg').innerText = `${n} лӢҳ нҷ”мқҙнҢ…!!`; document.getElementById('nickname').disabled = true; document.getElementById('nick-btn').style.display = 'none'; }
        function openModal(html, callback) { document.getElementById('modal-container').classList.remove('hidden'); document.getElementById('modal-content').innerHTML = html + `<button onclick="closeModal()" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-xl font-bold">нҷ•мқё</button>`; window.nextAction = callback; }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); if(window.nextAction) window.nextAction(); }
        function showHint(idx) { if(idx === 1) { state.stockQty = 0; } openModal(hints[idx], () => { document.getElementById('screen-main').style.display = 'none'; document.getElementById('screen-game').style.display = 'flex'; state.currentRound = idx; state.currentQ = 0; initChart(); updateGameUI(); }); }

        async function renderGroups() {
            const k = document.getElementById('search-group').value.toLowerCase();
            let data;
            try { ({ data } = await ghReadData()); } catch (e) { console.error(e); return; }
            const groups = [...data.groups].sort((a, b) => a.name.localeCompare(b.name));
            const cnt = {};
            data.participants.forEach(p => { cnt[p.group] = (cnt[p.group] || 0) + 1; });
            const list = document.getElementById('group-list'); list.innerHTML = '';
            groups.forEach(g => {
                if (!g.name.toLowerCase().includes(k)) return;
                const div = document.createElement('div'); div.className = `p-3 border rounded cursor-pointer flex justify-between ${state.group === g.name ? 'bg-blue-50 border-blue-500' : ''}`;
                div.innerHTML = `<span ondblclick="updateGroupName('${g.id}', '${g.name}')">${g.name}</span> <span class="font-bold text-blue-600">${cnt[g.name] || 0}лӘ…</span>`;
                div.onclick = () => selectGroup(g.name); list.appendChild(div);
            });
        }
        async function selectGroup(n) {
            if (state.group === n) return;
            if (state.group && !confirm("к·ёлЈ№ ліҖкІҪ мӢң кё°мЎҙ м •ліҙ мӮӯм ңлҗ©лӢҲлӢӨ.")) return;
            if (state.myDocId) {
                const myId = state.myDocId;
                await ghMutate(data => { data.participants = data.participants.filter(p => p.id !== myId); }, `remove participant ${myId}`);
                state.myDocId = null;
            }
            state.group = n; state.isConfirmed = false;
            document.getElementById('main-btn').classList.remove('hidden', 'bg-emerald-600');
            document.getElementById('main-btn').innerText = "м°ёк°Җ нҷ•м •";
            document.getElementById('state-display').innerText = `${state.nick || "лӢүл„Өмһ„"} - ${n}`;
            renderGroups();
        }
        async function handleMainButton() {
            if(!state.isConfirmed) {
                if(!state.nick) return alert("лӢүл„Өмһ„ н•„мҲҳ!");
                const { data } = await ghReadData();
                const exists = data.participants.some(p => p.group === state.group && p.nickname === state.nick);
                if (exists) return alert("мқҙлҜё мЎҙмһ¬н•ҳлҠ” лӢүл„Өмһ„мһ…лӢҲлӢӨ.");
                const newId = uid();
                await ghMutate(d => { d.participants.push({ id: newId, nickname: state.nick, group: state.group, profit: 0 }); }, `add participant ${state.nick}`);
                state.myDocId = newId; state.isConfirmed = true;
                document.getElementById('main-btn').innerText = "лҢҖнҡҢ мӢңмһ‘н•ҳкё°";
                document.getElementById('main-btn').classList.add('bg-emerald-600');
            } else {
                openModal(`<h2 class="text-xl font-bold mb-4">лӘЁмқҳнҲ¬мһҗлҢҖнҡҢ м„ӨлӘ…</h2><div class="text-sm text-left space-y-2"><p>1. лҢҖнҡҢлҠ” мҙқ 2лқјмҡҙл“ңлЎң кө¬м„ұлҗҳкі  к°Ғ лқјмҡҙл“ңлі„ 4лІҲмқҳ л§ӨмҲҳ/л§ӨлҸ„ кё°нҡҢк°Җ мһҲмҠөлӢҲлӢӨ.</p><p>2. нҲ¬мһҗкё°к°„ : 2024.06~2025.06</p><p>3. лҢҖнҡҢ мӨ‘ л§ӨмҲҳ/л§ӨлҸ„ 1лІҲмқҖ м§„н–үн•ҙм•ј н•©лӢҲлӢӨ.</p><p>4. мһ¬лҜёлЎң мҰҗкІЁмЈјмӢңл©ҙ к°җмӮ¬н•ҳкІ мҠөлӢҲлӢӨ !! нҷ”мқҙнҢ… !!</p></div>`, () => showHint(0));
            }
        }
        async function adminAction(t) {
            if (prompt("кҙҖлҰ¬мһҗ л№„л°ҖлІҲнҳё:") !== "1011") return;
            if (t === 'reset') {
                await ghMutate(data => { data.participants = []; }, 'reset participants');
                location.reload();
            } else if (t === 'create') {
                const n = prompt("к·ёлЈ№лӘ…:");
                if(n) await ghMutate(data => { data.groups.push({ id: uid(), name: n }); }, `create group ${n}`);
                renderGroups();
            }
        }
        async function updateGroupName(id, old) {
            if (prompt("кҙҖлҰ¬мһҗ л№„л°ҖлІҲнҳё:") !== "1011") return;
            const n = prompt("мғҲ к·ёлЈ№лӘ…:", old);
            if(n) { await ghMutate(data => { const g = data.groups.find(x => x.id === id); if (g) g.name = n; }, `rename group ${id}`); renderGroups(); }
        }

        function initChart() { const ctx = document.getElementById('stockChart').getContext('2d'); if(window.myChart) myChart.destroy(); myChart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'к°ҖкІ©', data: [], borderColor: '#3b82f6', datalabels: { anchor: 'end', align: 'top', formatter: (v) => v.toLocaleString() } }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: true } } } }); }
        function updateGameUI() { const isC = state.currentQ === 4; document.getElementById('round-title').innerText = `${state.currentRound + 1}лқјмҡҙл“ң - ${rounds[state.currentRound].stock}(${isC ? 'мў…к°Җ' : (state.currentQ + 1) + 'л¶„кё°'})`; document.getElementById('price-display').innerText = `нҳ„мһ¬к°Җ : ${rounds[state.currentRound].prices[state.currentQ].toLocaleString()}мӣҗ`; document.getElementById('cash-display').innerText = state.cash.toLocaleString(); document.getElementById('stock-display').innerText = state.stockQty; document.getElementById('trade-input-area').style.display = isC ? 'none' : 'flex'; myChart.data.labels = labels.slice(0, state.currentQ + 1); myChart.data.datasets[0].data = rounds[state.currentRound].prices.slice(0, state.currentQ + 1); myChart.update(); }
        function trade(t) { const q = parseInt(document.getElementById('qty-input').value); if(isNaN(q) || q <= 0) return alert("1 мқҙмғҒмқҳ мҲҳлҹүмқ„ мһ…л Ҙн•ҳм„ёмҡ”"); if(!confirm(`${q}мЈјлҘј ${t === 'buy' ? 'мӮ¬мӢңкІ мҠөлӢҲк№Ң?' : 'нҢҢмӢңкІ мҠөлӢҲк№Ң?'}`)) return; if(q > 0) state.hasTraded = true; const p = rounds[state.currentRound].prices[state.currentQ]; if(t === 'buy') { if(state.cash < q * p) return alert("мҳҲмҲҳкёҲ л¶ҖмЎұ"); state.cash -= q * p; state.stockQty += q; } else { if(state.stockQty < q) return alert("ліҙмң  мЈјмӢқ л¶ҖмЎұ"); state.cash += q * p; state.stockQty -= q; } updateGameUI(); }
        function nextQuarter() {
            if (state.currentRound === 1 && state.currentQ === 3 && !state.hasTraded) return alert("лҢҖнҡҢ мӨ‘ л§ӨмҲҳ/л§ӨлҸ„ 1лІҲмқҖ н•ҙм•ј н•©лӢҲлӢӨ!");
            if(state.currentQ < 3) { state.currentQ++; updateGameUI(); }
            else if(state.currentQ === 3) { if (state.stockQty > 0) { state.cash += state.stockQty * rounds[state.currentRound].prices[4]; state.stockQty = 0; } state.currentQ = 4; updateGameUI(); }
            else { showResult(state.currentRound === 1, state.cash); }

            const qtyInput = document.getElementById('qty-input');
            qtyInput.value = '';
            qtyInput.placeholder = 'мҲҳлҹү мһ…л Ҙ нӣ„ мӮ¬кё°/нҢ”кё° лІ„нҠј нҒҙлҰӯ';
        }
        function showResult(isF, f) { document.getElementById('game-ui').classList.add('hidden'); document.getElementById('result-ui').classList.remove('hidden'); let initialCash = !isF ? 500000 : state.r1FinalCash; let profit = (f / initialCash * 100 - 100); if (!isF) { state.r1FinalCash = f; document.getElementById('result-title').innerText = "1лқјмҡҙл“ң кІ°кіј"; document.getElementById('stats-box').innerHTML = `<p>мҙҲкё° мҳҲмҲҳкёҲ : ${initialCash.toLocaleString()}</p><p>нҳ„мһ¬ мҳҲмҲҳкёҲ : ${f.toLocaleString()}</p><p>мҲҳмқөлҘ  : ${profit.toFixed(2)}%</p>`; document.getElementById('result-btn').innerText = "2лқјмҡҙл“ң нһҢнҠё ліҙкё°"; document.getElementById('result-btn').onclick = () => { document.getElementById('game-ui').classList.remove('hidden'); document.getElementById('result-ui').classList.add('hidden'); state.cash = state.r1FinalCash; showHint(1); }; } else { document.getElementById('result-title').innerText = "2лқјмҡҙл“ң кІ°кіј"; document.getElementById('stats-box').innerHTML = `<p>мҙҲкё° мҳҲмҲҳкёҲ : ${initialCash.toLocaleString()}</p><p>нҳ„мһ¬ мҳҲмҲҳкёҲ : ${f.toLocaleString()}</p><p>мҲҳмқөлҘ  : ${profit.toFixed(2)}%</p>`; document.getElementById('result-btn').innerText = "мөңмў… кІ°кіј нҷ•мқё"; document.getElementById('result-btn').onclick = () => showFinalResult(f); } }
        async function showFinalResult(f) {
            let finalProfit = (f / 500000 * 100 - 100);
            document.getElementById('result-title').innerText = "мөңмў… кІ°кіј";
            document.getElementById('stats-box').innerHTML = `<p>мҙҲкё° мҳҲмҲҳкёҲ : 500,000</p><p>мөңмў… кёҲм•Ў : ${f.toLocaleString()}</p><p>мөңмў… мҲҳмқөлҘ  : ${finalProfit.toFixed(2)}%</p>`;
            const myId = state.myDocId; const profitVal = parseFloat(finalProfit.toFixed(2));
            await ghMutate(data => { const p = data.participants.find(x => x.id === myId); if (p) p.profit = profitVal; }, `update profit ${myId}`);
            document.getElementById('result-btn').innerText = "мҲңмң„ ліҙкё°";
            document.getElementById('result-btn').onclick = showRankings;
        }
        async function showRankings() {
            const { data } = await ghReadData();
            let list = data.participants.filter(p => p.group === state.group).map(p => ({ name: p.nickname, profit: p.profit || 0 }));
            list.sort((a, b) => b.profit - a.profit);
            const me = list.find(x => x.name === state.nick);
            let h = `<div class="mb-4 p-3 bg-purple-100 border-2 border-purple-500 rounded-xl font-bold">лӮҳмқҳ лӢүл„Өмһ„ : ${state.nick}<br>лӮҳмқҳ мҲҳмқөлҘ  : ${(me ? me.profit : 0).toFixed(2)}%</div><div class="max-h-60 overflow-y-auto"><table class="w-full text-center text-sm"><thead><tr><th>мҲңмң„</th><th>лӢүл„Өмһ„</th><th>мҲҳмқөлҘ </th></tr></thead><tbody>`;
            list.forEach((item, i) => { const isMe = item.name === state.nick; h += `<tr class="${isMe ? 'bg-purple-200 border-2 border-purple-500 font-bold' : ''}"><td>${i+1}мң„</td><td>${item.name}</td><td>${item.profit.toFixed(2)}%</td></tr>`; });
            h += `</tbody></table></div>`;
            document.getElementById('stats-box').innerHTML = h;
            document.getElementById('result-btn').innerText = "мў…лЈҢ (мғҲлЎңкі м№Ё)";
            document.getElementById('result-btn').onclick = () => location.reload();
        }

        renderGroups();
        setInterval(renderGroups, 8000); // GitHubм—җлҠ” мӢӨмӢңк°„ кө¬лҸ…мқҙ м—Ҷм–ҙ нҸҙл§ҒмңјлЎң к°ұмӢ н•©лӢҲлӢӨ.
    </script>
</body>
</html>
